name: Build & Release (OpenWrt/ImmortalWrt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      sdk_ver:
        description: 'SDK 系统版本 (如 23.05.5)'
        required: true
        default: '23.05.5'
      pkg_ver:
        description: '自定义插件版本 (如 5.1.1)'
        required: false
        default: '5.1.x-test'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86/64
          - ramips/mt7621
          - rockchip/armv8
          # - aarch64/generic # 官方通常不提供此目标的 SDK，建议注释掉

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.sdk_ver }}"
          else
            VERSION="23.05.5"
          fi
          
          TARGET=$(echo ${{ matrix.target }} | cut -d'/' -f1)
          SUB=$(echo ${{ matrix.target }} | cut -d'/' -f2)
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUB"
          
          echo "🌐 Checking SDK at $BASE_URL"
          
          # 【关键修复】使用 sed 's/^\*//' 删掉文件名开头的星号
          SDK_NAME=$(curl -sL "$BASE_URL/sha256sums" | grep "openwrt-sdk-" | awk '{print $2}' | sed 's/^\*//' | head -n 1)
          
          if [ -z "$SDK_NAME" ]; then
            echo "⚠️ Warning: SDK not found for $TARGET/$SUB."
            exit 0
          fi

          echo "✅ Found SDK: $SDK_NAME"
          # 现在下载链接就是正确的了
          wget "$BASE_URL/$SDK_NAME"
          tar xf "$SDK_NAME"
          
          # 统一重命名文件夹名为 sdk
          # 加上 -d 确保只找目录
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          mv "$SDK_DIR" sdk
          echo "SDK_EXISTS=true" >> $GITHUB_ENV

      - name: Build IPK
        if: env.SDK_EXISTS == 'true'
        run: |
          cd sdk
          
          # 1. 物理拷贝源码（排除 sdk 目录），确保文件就在 package 目录下
          rm -rf package/luci-app-onlineupgrade
          mkdir -p package/luci-app-onlineupgrade
          find .. -maxdepth 1 ! -name "sdk" ! -name ".." ! -name "." -exec cp -r {} package/luci-app-onlineupgrade/ \;
          
          # 2. 初始化 Feeds 并强制安装依赖
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 3. 确定版本号
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FINAL_VER="${{ github.event.inputs.pkg_ver }}"
          else
            FINAL_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi

          # 4. 关键：强制生成配置文件并检查是否包含该插件
          # 如果这里 grep 不到，说明 Makefile 里的 PKG_NAME 有问题
          echo "CONFIG_PACKAGE_luci-app-onlineupgrade=m" > .config
          make defconfig
          
          echo "🛠️ 检查配置状态:"
          grep "CONFIG_PACKAGE_luci-app-onlineupgrade" .config || echo "❌ 插件未被选中"

          echo "🛠️ 开始编译插件版本: $FINAL_VER"
          # 5. 强制清理并编译
          make package/luci-app-onlineupgrade/clean
          make package/luci-app-onlineupgrade/compile V=s PKG_VERSION="$FINAL_VER"
          
      - name: Debug Directory Structure
        run: |
          ls -R sdk/bin/
      
      - name: Collect and Rename
        if: env.SDK_EXISTS == 'true'
        run: |
          mkdir -p release
          
          echo "🔍 正在全盘搜索编译出的 IPK 文件..."
          # 1. 搜索整个 sdk 目录，查找生成的 ipk
          # 我们排除掉 build_dir 和 staging_dir 以免找错
          find sdk/bin -name "luci-app-onlineupgrade*.ipk" -exec cp {} release/ \;
          
          # 2. 如果 release 还是空的，尝试搜索整个 sdk 目录（保底方案）
          if [ -z "$(ls -A release 2>/dev/null)" ]; then
            echo "⚠️  在 sdk/bin 中未找到，正在扩大搜索范围..."
            find sdk -name "luci-app-onlineupgrade*.ipk" -exec cp {} release/ \;
          fi
          
          # 3. 调试：列出找到的文件
          echo "📂 已收集到的文件:"
          ls -R release/

          # 4. 检查是否真的拷贝到了文件
          if [ -z "$(ls -A release 2>/dev/null)" ]; then
            echo "❌ 错误: 编译可能失败了，未能在任何地方找到 .ipk 文件"
            # 打印 sdk 目录结构帮助排查
            find sdk -maxdepth 4 -name "bin"
            exit 1
          fi
          
          # 5. 处理架构名称
          ARCH_NAME=$(echo "${{ matrix.target }}" | tr '/' '_')
          echo "ARCH_ID=${ARCH_NAME}" >> $GITHUB_ENV
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.pkg_ver }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          # 6. 重命名
          cd release
          for f in *.ipk; do
            if [ -f "$f" ]; then
              if [[ "$f" != "${TAG_NAME}_"* ]]; then
                echo "📝 重命名 $f 为 ${TAG_NAME}_${ARCH_NAME}_$f"
                mv "$f" "${TAG_NAME}_${ARCH_NAME}_$f"
              fi
            fi
          done

      - name: Upload Artifacts
        if: env.SDK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ env.ARCH_ID }}
          path: release/*.ipk

      - name: Upload to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && env.SDK_EXISTS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
