name: Build & Release (OpenWrt/ImmortalWrt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      sdk_ver:
        description: 'SDK 系统版本 (如 23.05.5)'
        required: true
        default: '23.05.5'
      pkg_ver:
        description: '自定义插件版本 (如 5.1.1)'
        required: false
        default: '5.1.x-test'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86/64
          - ramips/mt7621
          - rockchip/armv8
          # - aarch64/generic # 官方通常不提供此目标的 SDK，建议注释掉

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.sdk_ver }}"
          else
            VERSION="23.05.5"
          fi
          
          TARGET=$(echo ${{ matrix.target }} | cut -d'/' -f1)
          SUB=$(echo ${{ matrix.target }} | cut -d'/' -f2)
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUB"
          
          echo "🌐 Checking SDK at $BASE_URL"
          
          # 【关键修复】使用 sed 's/^\*//' 删掉文件名开头的星号
          SDK_NAME=$(curl -sL "$BASE_URL/sha256sums" | grep "openwrt-sdk-" | awk '{print $2}' | sed 's/^\*//' | head -n 1)
          
          if [ -z "$SDK_NAME" ]; then
            echo "⚠️ Warning: SDK not found for $TARGET/$SUB."
            exit 0
          fi

          echo "✅ Found SDK: $SDK_NAME"
          # 现在下载链接就是正确的了
          wget "$BASE_URL/$SDK_NAME"
          tar xf "$SDK_NAME"
          
          # 统一重命名文件夹名为 sdk
          # 加上 -d 确保只找目录
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          mv "$SDK_DIR" sdk
          echo "SDK_EXISTS=true" >> $GITHUB_ENV

      - name: Build IPK
        if: env.SDK_EXISTS == 'true'
        run: |
          cd sdk
          
          # 1. 建立软链接
          ln -s "$(pwd)/../" "package/luci-app-onlineupgrade"
          
          # 2. 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          
          # 3. 核心修复：强制注入插件配置并刷新，避免触发交互式 menuconfig
          echo "CONFIG_PACKAGE_luci-app-onlineupgrade=m" >> .config
          make defconfig
          
          # 4. 获取版本号
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FINAL_VER="${{ github.event.inputs.pkg_ver }}"
          else
            FINAL_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi
          
          echo "🛠️ 正在编译插件版本: $FINAL_VER"
          # 5. 编译插件
          # 注意：这里只编译你的插件及其依赖，不编译整个 SDK
          make package/luci-app-onlineupgrade/compile V=s PKG_VERSION="$FINAL_VER" -j$(nproc)
          
      - name: Collect and Rename
        if: env.SDK_EXISTS == 'true'
        run: |
          mkdir -p release
          find sdk/bin/packages -name "luci-app-onlineupgrade*.ipk" -exec cp {} release/ \;
          
          ARCH_NAME=$(echo "${{ matrix.target }}" | tr '/' '_')
          echo "ARCH_ID=${ARCH_NAME}" >> $GITHUB_ENV
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.pkg_ver }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          cd release
          for f in *.ipk; do
            if [ -f "$f" ]; then
              mv "$f" "${TAG_NAME}_${ARCH_NAME}_$f"
            fi
          done

      - name: Upload Artifacts
        if: env.SDK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ env.ARCH_ID }}
          path: release/*.ipk

      - name: Upload to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && env.SDK_EXISTS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
