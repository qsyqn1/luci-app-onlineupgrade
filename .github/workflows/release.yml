name: Build & Release (OpenWrt 24.10)

on:
  push:
    tags:
      - 'v*'
  # 【新增】手动触发配置
  workflow_dispatch:
    inputs:
      version:
        description: '手动构建的版本号 (例如 5.1.1)'
        required: false
        default: 'manual-build'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86/64
          - ramips/mt7621
          - aarch64/generic
          - rockchip/armv8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          VERSION="24.10.0"
          TARGET=$(echo ${{ matrix.target }} | cut -d'/' -f1)
          SUB=$(echo ${{ matrix.target }} | cut -d'/' -f2)
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUB"
          
          echo "Fetching SDK filename from $BASE_URL..."
          SDK_NAME=$(curl -sL "$BASE_URL/sha256sums" | grep "openwrt-sdk-" | awk '{print $2}' | head -n 1)
          
          if [ -z "$SDK_NAME" ]; then
            echo "Error: Could not find SDK for $TARGET/$SUB"
            exit 1
          fi

          wget "$BASE_URL/$SDK_NAME"
          tar xf "$SDK_NAME"
          mv openwrt-sdk-* sdk

      - name: Build IPK
        run: |
          cd sdk
          ln -s ../../ luci-app-onlineupgrade package/luci-app-onlineupgrade
          
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          
          # 【逻辑优化】判断是 Tag 触发还是手动触发
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKG_VER="${{ github.event.inputs.version }}"
          else
            PKG_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi
          
          make package/luci-app-onlineupgrade/compile V=s PKG_VERSION="$PKG_VER"

      - name: Collect and Rename
        run: |
          mkdir -p release
          find sdk/bin/packages -name "luci-app-onlineupgrade*.ipk" -exec cp {} release/ \;
          
          ARCH_NAME=$(echo "${{ matrix.target }}" | tr '/' '_')
          
          # 同样处理重命名逻辑
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.version }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          cd release
          for f in *.ipk; do
            if [ -f "$f" ]; then
              mv "$f" "${TAG_NAME}_${ARCH_NAME}_$f"
            fi
          done

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          # 手动触发时，如果 Tag 不存在，此步骤可能会创建 Draft 或报错
          # 建议手动测试时仅查看 Artifacts，或者如下配置：
          tag_name: ${{ github.ref_name }}
          files: release/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 手动构建时跳过发布到 Release 页面，避免污染正式版（可选）
        if: github.event_name == 'push'
