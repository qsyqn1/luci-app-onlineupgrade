name: Build & Release (OpenWrt 24.10)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86/64
          - ramips/mt7621
          - aarch64/generic
          - rockchip/armv8  # 增加你提到的设备架构支持

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          # 定义版本号
          VERSION="24.10.0"
          TARGET=$(echo ${{ matrix.target }} | cut -d'/' -f1)
          SUB=$(echo ${{ matrix.target }} | cut -d'/' -f2)
          
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUB"
          
          # 关键点：动态获取完整的 SDK 文件名
          echo "Fetching SDK filename from $BASE_URL..."
          SDK_NAME=$(curl -sL "$BASE_URL/sha256sums" | grep "openwrt-sdk-" | awk '{print $2}' | head -n 1)
          
          if [ -z "$SDK_NAME" ]; then
            echo "Error: Could not find SDK for $TARGET/$SUB"
            exit 1
          fi

          wget "$BASE_URL/$SDK_NAME"
          tar xf "$SDK_NAME"
          mv openwrt-sdk-* sdk

      - name: Build IPK
        run: |
          cd sdk
          # 将当前源码链接到 SDK 的 package 目录
          ln -s ../../ luci-app-onlineupgrade
          
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          
          # 注入版本号编译
          PKG_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          make package/luci-app-onlineupgrade/compile V=s PKG_VERSION="$PKG_VER"

      - name: Collect and Rename
        run: |
          mkdir -p release
          # 1. 将编译好的 ipk 找出来并拷贝到 release 目录
          find sdk/bin/packages -name "luci-app-onlineupgrade*.ipk" -exec cp {} release/ \;
          
          # 2. 在 Shell 中处理架构名（将 / 替换为 _）
          # 例如 x86/64 变为 x86_64
          ARCH_NAME=$(echo "${{ matrix.target }}" | tr '/' '_')
          TAG_NAME="${{ github.ref_name }}"
          
          # 3. 进入目录执行重命名
          cd release
          for f in *.ipk; do
            if [ -f "$f" ]; then
              echo "Renaming $f to ${TAG_NAME}_${ARCH_NAME}_$f"
              mv "$f" "${TAG_NAME}_${ARCH_NAME}_$f"
            fi
          done
