name: Build & Release (OpenWrt/ImmortalWrt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      sdk_ver:
        description: 'SDK 系统版本 (用于定位下载地址，如 23.05.5)'
        required: true
        default: '23.05.5'
      pkg_ver:
        description: '自定义插件版本 (显示在 IPK 中的版本号)'
        required: false
        default: '5.1.x-test'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86/64
          - ramips/mt7621
          - aarch64/generic
          - rockchip/armv8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.sdk_ver }}"
          else
            VERSION="23.05.5"
          fi
          
          TARGET=$(echo ${{ matrix.target }} | cut -d'/' -f1)
          SUB=$(echo ${{ matrix.target }} | cut -d'/' -f2)
          BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUB"
          
          echo "🌐 Fetching SDK from $BASE_URL..."
          SDK_NAME=$(curl -sL "$BASE_URL/sha256sums" | grep "openwrt-sdk-" | awk '{print $2}' | head -n 1)
          
          if [ -z "$SDK_NAME" ]; then
            echo "❌ Error: SDK not found at $BASE_URL"
            exit 1
          fi

          wget "$BASE_URL/$SDK_NAME"
          tar xf "$SDK_NAME"
          mv openwrt-sdk-* sdk

      - name: Build IPK
        run: |
          cd sdk
          ln -s ../../ luci-app-onlineupgrade package/luci-app-onlineupgrade
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FINAL_VER="${{ github.event.inputs.pkg_ver }}"
          else
            FINAL_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          fi
          
          make package/luci-app-onlineupgrade/compile V=s PKG_VERSION="$FINAL_VER"

      - name: Collect and Rename
        id: collect
        run: |
          mkdir -p release
          find sdk/bin/packages -name "luci-app-onlineupgrade*.ipk" -exec cp {} release/ \;
          
          # 核心修复：在这里处理好架构名，并存入环境变量供后续步骤使用
          ARCH_NAME=$(echo "${{ matrix.target }}" | tr '/' '_')
          echo "ARCH_ID=${ARCH_NAME}" >> $GITHUB_ENV
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.pkg_ver }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          cd release
          for f in *.ipk; do
            if [ -f "$f" ]; then
              mv "$f" "${TAG_NAME}_${ARCH_NAME}_$f"
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          # 核心修复：使用上面存入环境的 ARCH_ID，避开 replace 函数
          name: ipk-${{ env.ARCH_ID }}
          path: release/*.ipk

      - name: Upload to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
