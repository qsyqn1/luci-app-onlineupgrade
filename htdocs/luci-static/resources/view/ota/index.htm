
<%+header%>
<h2>OTA V5.1</h2>

<button onclick="start()">Start Upgrade</button>

<div style="width:100%;background:#333;margin-top:10px">
 <div id="bar" style="width:0%;background:#4caf50;color:#fff">0%</div>
</div>

<pre id="log"></pre>

<script>
const ws = new WebSocket("ws://" + location.host + "/ubus");

ws.onmessage = (msg)=>{
 const d = JSON.parse(msg.data);
 if(d.method==="ota.event"){
   let p = d.params.progress;
   document.getElementById("bar").style.width = p+"%";
   document.getElementById("bar").innerText = p+"%";
 }
};

function start(){
 fetch('/cgi-bin/luci/admin/services/ota/start');
}

setInterval(async ()=>{
 let r = await fetch('/cgi-bin/luci/admin/services/ota/state');
 let j = await r.json();
 document.getElementById("log").innerText = JSON.stringify(j,null,2);
},1000);
</script>

<%+footer%>
