<%+header%>

<div class="cbi-map">
    <h2 class="section-title">OTA 固件在线升级</h2>
    <div class="cbi-map-descr">通过云端服务器获取最新的系统固件并执行自动刷写。</div>

    <fieldset class="cbi-section">
        <legend>设备信息</legend>
        <div class="cbi-section-node">
            <div class="cbi-value">
                <label class="cbi-value-title">运行平台</label>
                <div class="cbi-value-field">
                    <span class="label success" id="platform">正在读取...</span>
                </div>
            </div>
            <div class="cbi-value">
                <label class="cbi-value-title">当前版本</label>
                <div class="cbi-value-field">
                    <span class="label info" id="cur_ver">正在读取...</span>
                </div>
            </div>
            <div class="cbi-value">
                <label class="cbi-value-title">云端最新版本</label>
                <div class="cbi-value-field">
                    <span class="label" id="new_ver" style="background-color: #888;">正在检查...</span>
                </div>
            </div>
            <div class="cbi-value">
                <label class="cbi-value-title">可用固件格式</label>
                <div class="cbi-value-field">
                    <select id="file_selector" class="cbi-input-select" style="width:100%; font-family:monospace;">
                        <option value="">正在获取云端列表...</option>
                    </select>
                    <div class="cbi-value-description">
                        <span id="match_tip" style="color:#2dce89; font-weight:bold;">提示：系统将优先尝试自动匹配。</span><br>
                        若自动匹配失败，请在上方列表中手动选择对应的 <strong>.img.gz</strong> 文件。
                    </div>
                </div>
            </div>
        </div>
    </fieldset>

<fieldset class="cbi-section" id="changelog_field" style="display:none;">
    <legend>版本更新说明</legend>
    <div class="cbi-section-node">
        <div style="padding:15px; background:#f4f5f7; border-radius:8px; white-space: pre-wrap; font-size:13px; color:#555;" id="changelog_text">
        </div>
    </div>
</fieldset>

<script>
    // 在 fetch check_update 的回调里增加：
    if (data.log) {
        document.getElementById('changelog_field').style.display = 'block';
        document.getElementById('changelog_text').innerText = data.log;
    }
</script>

    <fieldset class="cbi-section">
        <legend>升级任务</legend>
        <div class="cbi-section-node">
            <div class="cbi-value">
                <label class="cbi-value-title">任务状态</label>
                <div class="cbi-value-field">
                    <span id="status" style="font-weight: bold; color: #555;">IDLE (空闲)</span>
                </div>
            </div>
            
            <div id="progress_bar_container" style="display:none; padding: 20px 10px;">
                <div style="width:100%; background:#eee; height:12px; border-radius: 6px; overflow: hidden;">
                    <div id="progress_bar" style="width:0%; background:linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); height:100%; transition: width 0.5s;"></div>
                </div>
                <div style="text-align: center; margin-top: 5px; font-size: 12px; color: #888;" id="progress_text">0%</div>
            </div>
        </div>
    </fieldset>

    <div class="cbi-page-actions">
        <button class="cbi-button cbi-button-apply" id="start_btn" onclick="startUpgrade()">立即检查并升级</button>
    </div>
</div>

<style>
    .label { padding: 2px 8px; border-radius: 4px; font-size: 0.9em; color: white; }
    .success { background-color: #2dce89; }
    .info { background-color: #11cdef; }
    .cbi-input-select { height: auto !important; padding: 4px !important; }
</style>

<script type="text/javascript">
    let pollTimer = null;
    let errorCount = 0;

    document.addEventListener("DOMContentLoaded", function() {
        // 1. 获取本地信息
        fetch('<%=url("admin/services/ota/info")%>')
            .then(res => res.json())
            .then(data => {
                document.getElementById('platform').innerText = data.platform || 'Unknown';
                document.getElementById('cur_ver').innerText = data.version || 'Unknown';
            });

        // 2. 获取云端信息
        fetch('<%=url("admin/services/ota/check_update")%>')
            .then(res => res.json())
            .then(data => {
                const newVerEl = document.getElementById('new_ver');
                const selector = document.getElementById('file_selector');

                if (data.remote_version && data.remote_version !== "N/A") {
                    newVerEl.innerText = data.remote_version;
                    newVerEl.style.backgroundColor = "#fb6340";
                }

                selector.innerHTML = '<option value="">-- 自动匹配 (优先搜索 sysupgrade) --</option>';
                if (data.files) {
                    data.files.trim().split('\n').forEach(file => {
                        const name = file.trim();
                        // 【优化点】前端正则二次过滤：只显示镜像格式
                        if (name && /\.(img\.gz|img|bin)$/i.test(name)) {
                            const opt = document.createElement('option');
                            opt.value = name; 
                            opt.text = name;
                            if (name.includes('combined-efi')) opt.text += " (推荐项目)";
                            selector.add(opt);
                        }
                    });
                }
            });
    });

    function pollState() {
        fetch('<%=url("admin/services/ota/state")%>')
            .then(res => {
                // 如果后端返回 403 或 500，且进度已经很高，说明系统已经在执行重启了
                if (!res.ok) throw new Error(res.status);
                return res.json();
            })
            .then(data => {
                errorCount = 0; // 重置错误计数
                const statusEl = document.getElementById('status');
                const p = parseInt(data.progress || 0);
                
                statusEl.innerText = data.msg || data.state;
                document.getElementById('progress_bar').style.width = p + "%";
                document.getElementById('progress_text').innerText = p + "%";

                // 当状态为 SUCCESS 且进度 100 时，引导重启
                if (data.state === "SUCCESS" && p >= 100) {
                    clearInterval(pollTimer);
                    statusEl.innerText = "升级包已就绪，系统正在重启中...";
                    setTimeout(() => {
                        alert("固件刷写完成！系统正在重启，请于 2 分钟后刷新页面。");
                        location.href = window.location.protocol + "//" + window.location.host;
                    }, 2000);
                } else if (data.state === "ERROR") {
                    clearInterval(pollTimer);
                    alert("错误: " + (data.msg || "升级过程中断"));
                    document.getElementById('start_btn').disabled = false;
                    document.getElementById('start_btn').innerText = "重试升级";
                }
            })
            .catch(err => {
                errorCount++;
                const statusEl = document.getElementById('status');
                const currentProgress = parseInt(document.getElementById('progress_text').innerText);

                // 如果进度超过 90% 且连续多次通讯失败，说明路由器正在重启，uhttpd 已关闭
                if (currentProgress >= 90 || errorCount > 5) {
                    clearInterval(pollTimer);
                    statusEl.innerText = "连接已断开，系统正在重启，请手动刷新页面。";
                    statusEl.style.color = "#fb6340";
                } else {
                    statusEl.innerText = "正在等待后端响应 (" + errorCount + ")...";
                }
                console.warn("轮询异常:", err.message);
            });
    }

    function startUpgrade() {
        const selectedFile = document.getElementById('file_selector').value;
        const btn = document.getElementById('start_btn');
        
        if (!confirm("确定开始升级吗？升级过程中请勿断电。")) return;

        btn.disabled = true;
        btn.innerText = "正在初始化...";
        document.getElementById('progress_bar_container').style.display = 'block';

        let startUrl = '<%=url("admin/services/ota/start")%>';
        if (selectedFile) startUrl += "?filename=" + encodeURIComponent(selectedFile);

        fetch(startUrl)
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    errorCount = 0;
                    if (pollTimer) clearInterval(pollTimer);
                    pollTimer = setInterval(pollState, 2000);
                } else {
                    alert("启动失败: " + data.msg);
                    btn.disabled = false;
                    btn.innerText = "立即检查并升级";
                }
            })
            .catch(err => {
                alert("通讯失败，请检查网络权限或 ACL 配置文件。");
                btn.disabled = false;
            });
    }
</script>

<%+footer%>
